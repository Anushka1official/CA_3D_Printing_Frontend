<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | C & A 3D printing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar sticky-top py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-baseline" href="index.html">
                <span class="brand-gold">C & A</span>
                <span class="brand-white ms-2">3D printing</span>
            </a>
            <ul class="nav">
                <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="admin.html">Admin Login</a></li>
            </ul>
        </div>
    </nav>

    <section class="section-py bg-dark-alt" style="min-height: 80vh; display: flex; align-items: center;">
        <div class="container">
            <div class="text-center mb-5">
                <div class="hero-eyebrow">START YOUR PROJECT</div>
                <h2 class="section-title text-white">Upload Your <em class="text-tan">Model</em></h2>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="calc-card highlight-border">
                        <form id="customerForm">
                            <div class="mb-4">
                                <label class="form-label text-muted">Upload 3D Model (.stl, .obj)</label>
                                <input type="file" id="modelFile" class="form-control-ca" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted">Infill Percentage</label>
                                <select id="infill" class="form-control-ca">
                                    <option value="10">10% (Standard)</option>
                                    <option value="20">20% (Strong)</option>
                                    <option value="50">50% (Heavy Duty)</option>
                                    <option value="100">100% (Solid)</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted">Material</label>
                                <select id="material" class="form-control-ca">
                                    <option value="PLA">PLA</option>
                                    <option value="PETG">PETG</option>
                                    <option value="ABS">ABS</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted">Color</label>
                                <select id="color" class="form-control-ca">
                                    <option value="Black">Black</option>
                                    <option value="White">White</option>
                                    <option value="Grey">Grey</option>
                                    <option value="Gold">Gold</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-ca-gold w-100 mt-3">SUBMIT ORDER →</button>
                        </form>
                        <div id="orderStatus" class="mt-4 text-center text-tan fw-bold"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
