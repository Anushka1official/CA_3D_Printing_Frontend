<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order | C & A 3D printing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar sticky-top py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand brand-flex" href="index.html">
                <span class="text-gold fw-bold fs-2">C & A</span>
                <span class="text-white ms-2 fs-5">3D printing</span>
            </a>
            <a href="admin.html" class="nav-link text-muted small">Admin Login</a>
        </div>
    </nav>

    <section class="section-padding bg-dark-main">
        <div class="container">
            <div class="text-center mb-5">
                <h2 class="section-title">Upload Your <em>Model</em></h2>
                <p class="text-muted">Configure your 3D print parameters below.</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card-container border-highlight">
                        <form id="customerForm">
                            <div class="mb-3">
                                <label class="form-label text-gold">Upload 3D Model (.stl, .obj)</label>
                                <input type="file" id="modelFile" class="input-base" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label text-gold">Infill Percentage</label>
                                <select id="infill" class="input-base">
                                    <option value="10">10% (Standard)</option>
                                    <option value="20">20% (Strong)</option>
                                    <option value="50">50% (Heavy Duty)</option>
                                    <option value="100">100% (Solid)</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-gold">Material</label>
                                <select id="material" class="input-base">
                                    <option value="PLA">PLA</option>
                                    <option value="PETG">PETG</option>
                                    <option value="ABS">ABS</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-gold">Color</label>
                                <select id="color" class="input-base">
                                    <option value="Black">Black</option>
                                    <option value="White">White</option>
                                    <option value="Grey">Grey</option>
                                    <option value="Gold">Gold</option>
                                </select>
                            </div>

                            <button type="submit" class="btn-action w-100">SUBMIT ORDER →</button>
                        </form>
                        <div id="orderStatus" class="mt-3 text-center text-white"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
