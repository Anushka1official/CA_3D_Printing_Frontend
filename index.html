<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order | C & A 3D printing</title>
    <style>
        body { background-color: #0d0d0d; color: #ccc; font-family: Arial, sans-serif; margin: 0; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #222; margin-bottom: 40px; }
        .logo-cna { color: #C99E54; font-size: 28px; font-weight: bold; text-decoration: none; }
        .logo-sub { color: white; font-size: 16px; margin-left: 8px; font-weight: normal; }
        .admin-link { color: #444; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .admin-link:hover { color: #C99E54; }
        
        .container { display: flex; justify-content: center; }
        .box { background-color: #141414; padding: 40px; border: 1px solid #222; width: 450px; }
        .box-title { color: #C99E54; font-family: 'Georgia', serif; font-style: italic; text-align: center; margin-bottom: 40px; font-size: 22px; letter-spacing: 1px; }
        
        .input-group { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .input-group label { color: #888; font-size: 15px; }
        .input-group input, .input-group select { background-color: #1a1a1a; border: 1px solid #333; color: white; padding: 8px; width: 200px; outline: none; }
        .input-group input:focus, .input-group select:focus { border-color: #C99E54; }
        
        .btn-submit { background-color: transparent; border: 1px solid #C99E54; color: #C99E54; width: 100%; padding: 15px; margin-top: 30px; cursor: pointer; transition: 0.3s; font-weight: bold; letter-spacing: 1px; }
        .btn-submit:hover { background-color: #C99E54; color: #000; }
        #orderStatus { text-align: center; margin-top: 20px; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <a href="index.html" class="logo-cna">C & A</a>
            <span class="logo-sub">3D printing</span>
        </div>
        <a href="admin.html" class="admin-link">Admin Login</a>
    </div>

    <div class="container">
        <div class="box">
            <h3 class="box-title">UPLOAD YOUR MODEL</h3>
            
            <form id="customerForm">
                <div class="input-group">
                    <label>Upload 3D Model</label>
                    <input type="file" id="modelFile" required>
                </div>
                
                <div class="input-group">
                    <label>Infill Percentage</label>
                    <select id="infill">
                        <option value="10">10% (Standard)</option>
                        <option value="20">20% (Strong)</option>
                        <option value="50">50% (Heavy Duty)</option>
                        <option value="100">100% (Solid)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Material</label>
                    <select id="material">
                        <option value="PLA">PLA</option>
                        <option value="PETG">PETG</option>
                        <option value="ABS">ABS</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Color</label>
                    <select id="color">
                        <option value="Black">Black</option>
                        <option value="White">White</option>
                        <option value="Grey">Grey</option>
                        <option value="Gold">Gold</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">SUBMIT ORDER</button>
            </form>
            <div id="orderStatus"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
