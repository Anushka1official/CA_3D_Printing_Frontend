<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | C & A 3D printing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar sticky-top py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-baseline" href="index.html">
                <span class="brand-gold">C & A</span>
                <span class="brand-white ms-2">3D printing</span>
            </a>
            <ul class="nav">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="contact.html">Contact Us</a></li>
            </ul>
        </div>
    </nav>

    <section class="section-py">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8 text-center mb-5">
                    <div class="hero-eyebrow">GET IN TOUCH</div>
                    <h1 class="hero-heading" style="font-size: 3rem;">Let's Build <em>Together</em>.</h1>
                </div>
            </div>

            <div class="row g-5">
                <div class="col-md-5">
                    <div class="calc-card h-100">
                        <h4 class="card-header-gold">Contact Information</h4>
                        <div class="d-flex align-items-start mb-4">
                            <i class="fa-solid fa-location-dot mt-1 me-3 text-tan"></i>
                            <p class="text-muted">123 Innovation Drive, Tech Park<br>Colombo, Sri Lanka</p>
                        </div>
                        <div class="d-flex align-items-center mb-4">
                            <i class="fa-solid fa-envelope me-3 text-tan"></i>
                            <p class="text-muted mb-0">hello@ca3dprint.com</p>
                        </div>
                        <div class="d-flex align-items-center">
                            <i class="fa-solid fa-phone me-3 text-tan"></i>
                            <p class="text-muted mb-0">+94 77 123 4567</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-7">
                    <div class="calc-card highlight-border">
                        <form action="#">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label text-muted">Full Name</label>
                                    <input type="text" class="form-control-ca" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted">Email Address</label>
                                    <input type="email" class="form-control-ca" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label text-muted">Message</label>
                                    <textarea class="form-control-ca" rows="5" required></textarea>
                                </div>
                                <div class="col-12">
                                    <button type="submit" class="btn-ca-gold w-100">SEND MESSAGE</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="site-footer">
        <div class="container text-center">
            <a class="navbar-brand d-flex justify-content-center align-items-baseline mb-3" href="#">
                <span class="brand-gold-sm">C & A</span>
                <span class="brand-white-sm ms-2">3D printing</span>
            </a>
            <p class="text-muted small">© 2026 C & A 3D printing.</p>
        </div>
    </footer>

</body>
</html>
