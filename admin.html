<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | C & A 3D printing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5" id="loginSection">
        <div class="row justify-content-center">
            <div class="col-md-5 card-container">
                <h4 class="text-gold text-center mb-4">Admin Access</h4>
                <input type="password" id="adminPassword" class="input-base mb-3" placeholder="Enter Password">
                <button onclick="checkLogin()" class="btn-action w-100">LOGIN</button>
            </div>
        </div>
    </div>

    <div class="container mt-5 d-none" id="calculatorSection">
        <h2 class="text-center text-white mb-4">Pricing Calculator</h2>
        <div class="row g-4 justify-content-center">
            <div class="col-lg-5 card-container border-highlight">
                <h4 class="text-gold mb-3">Operational Base</h4>
                <div class="mb-2"><label class="text-muted">Filament Price</label><input type="number" id="P" class="input-base" value="7000"></div>
                <div class="mb-2"><label class="text-muted">Density</label><input type="number" id="rho" class="input-base" value="1.25"></div>
                <div class="mb-2"><label class="text-muted">Diameter</label><input type="number" id="d_mm" class="input-base" value="1.75"></div>
                <div class="mb-2"><label class="text-muted">Power (W)</label><input type="number" id="W" class="input-base" value="150"></div>
                <div class="mb-2"><label class="text-muted">Elec. Price</label><input type="number" id="R" class="input-base" value="67"></div>
                <div class="mb-2"><label class="text-muted">Printer Cost</label><input type="number" id="Cp" class="input-base" value="140000"></div>
                <div class="mb-2"><label class="text-muted">Lifetime (Hrs)</label><input type="number" id="H" class="input-base" value="2000"></div>
                <div class="mb-2"><label class="text-muted">Failure Risk</label><input type="number" id="F" class="input-base" value="0.1"></div>
            </div>
            
            <div class="col-lg-5 card-container border-highlight">
                <h4 class="text-gold mb-3">Job Specifics</h4>
                <div class="mb-3"><label class="text-white fw-bold">Print Time (Mins)</label><input type="number" id="T_min" class="input-base"></div>
                <div class="mb-3"><label class="text-white fw-bold">Filament Length (M)</label><input type="number" id="L_m" class="input-base"></div>
                <div class="mb-3"><label class="text-white fw-bold">Profit Margin (%)</label><input type="number" id="M_pct" class="input-base"></div>
                <button onclick="calculatePrice()" class="btn-action w-100 mt-3">CALCULATE</button>
            </div>
        </div>
        <div class="text-center mt-4"><h1 id="finalPrice" class="text-gold display-4">Rs 0.00</h1></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
